  <!-- Sub -->
  <text x="48" y="330" font-family="Arial, sans-serif" font-size="15" fill="#666666">Identity, strategy, and digital design for</text>
  <text x="48" y="350" font-family="Arial, sans-serif" font-size="15" fill="#666666">companies that care about craft.</text>

  <!-- CTA -->
  <rect x="48" y="376" width="152" height="44" rx="4" fill="#111111"/>
  <text x="124" y="403" text-anchor="middle" font-family="Arial" font-size="13" fill="white" font-weight="bold">Start a project</text>

  <text x="220" y="403" font-family="Georgia, serif" font-size="13" fill="#888888" font-style="italic">or browse our work ↓</text>

