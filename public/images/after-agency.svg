<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <!-- Background -->
  <rect width="1200" height="700" fill="#faf9f7"/>

  <!-- Nav -->
  <rect width="1200" height="68" fill="#faf9f7"/>
  <rect y="68" width="1200" height="1" fill="#e5e0d8"/>

  <!-- Logo -->
  <text x="48" y="41" font-family="Georgia, serif" font-size="20" fill="#111111" font-weight="bold" letter-spacing="-0.5">Craft</text>
