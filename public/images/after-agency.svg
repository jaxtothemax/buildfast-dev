  <!-- Nav links -->
  <text x="430" y="40" font-family="Arial, sans-serif" font-size="13" fill="#555555">Work</text>
  <text x="480" y="40" font-family="Arial, sans-serif" font-size="13" fill="#555555">Services</text>
  <text x="554" y="40" font-family="Arial, sans-serif" font-size="13" fill="#555555">About</text>
  <text x="610" y="40" font-family="Arial, sans-serif" font-size="13" fill="#555555">Blog</text>

  <!-- Nav right -->
  <text x="1040" y="40" font-family="Arial, sans-serif" font-size="13" fill="#555555">hello@craftco.com</text>
  <rect x="1140" y="21" width="8" height="26" rx="0" fill="#0d9488"/>

  <!-- Hero -->
  <rect y="69" width="1200" height="360" fill="#faf9f7"/>

