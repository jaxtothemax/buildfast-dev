  <rect x="48" y="548" width="258" height="120" rx="6" fill="#f0ede8"/>
  <text x="68" y="580" font-family="Georgia, serif" font-size="14" fill="#111111" font-weight="bold">Brand Identity</text>
  <text x="68" y="600" font-family="Arial, sans-serif" font-size="12" fill="#777777">Logos, visual systems,</text>
  <text x="68" y="616" font-family="Arial, sans-serif" font-size="12" fill="#777777">and brand guidelines.</text>
  <text x="68" y="648" font-family="Arial, sans-serif" font-size="11" fill="#0d9488">See examples →</text>

  <rect x="326" y="548" width="258" height="120" rx="6" fill="#f0ede8"/>
  <text x="346" y="580" font-family="Georgia, serif" font-size="14" fill="#111111" font-weight="bold">Web Design</text>
  <text x="346" y="600" font-family="Arial, sans-serif" font-size="12" fill="#777777">Marketing sites, portfolios,</text>
  <text x="346" y="616" font-family="Arial, sans-serif" font-size="12" fill="#777777">and landing pages.</text>
  <text x="346" y="648" font-family="Arial, sans-serif" font-size="11" fill="#0d9488">See examples →</text>

  <rect x="604" y="548" width="258" height="120" rx="6" fill="#f0ede8"/>
  <text x="624" y="580" font-family="Georgia, serif" font-size="14" fill="#111111" font-weight="bold">Strategy</text>
  <text x="624" y="600" font-family="Arial, sans-serif" font-size="12" fill="#777777">Positioning, messaging,</text>
  <text x="624" y="616" font-family="Arial, sans-serif" font-size="12" fill="#777777">and audience research.</text>
  <text x="624" y="648" font-family="Arial, sans-serif" font-size="11" fill="#0d9488">See examples →</text>

  <rect x="882" y="548" width="270" height="120" rx="6" fill="#111111"/>
  <text x="902" y="580" font-family="Georgia, serif" font-size="14" fill="white" font-weight="bold">Ready to start?</text>
  <text x="902" y="600" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.55)">We take on 3–4 projects</text>
  <text x="902" y="616" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.55)">per quarter.</text>
  <rect x="902" y="630" width="108" height="28" rx="4" fill="#0d9488"/>
  <text x="956" y="649" text-anchor="middle" font-family="Arial" font-size="12" fill="white" font-weight="bold">Get in touch</text>
