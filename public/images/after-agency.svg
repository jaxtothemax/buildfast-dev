  <text x="-12" y="360" font-family="Georgia, serif" font-size="380" fill="rgba(0,0,0,0.03)" font-weight="bold">01</text>

  <!-- Eyebrow -->
  <text x="48" y="124" font-family="Arial, sans-serif" font-size="11" fill="#0d9488" letter-spacing="2">INDEPENDENT DESIGN STUDIO — EST. 2016</text>
