  <rect x="680" y="140" width="480" height="260" rx="8" fill="#f0ede8"/>
  <text x="920" y="252" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#aaa9a5" font-style="italic">Selected client work</text>
  <text x="920" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c5c2bc" letter-spacing="1">ORINOCO   ·   HELM   ·   DAYBREAK   ·   SILO</text>

  <!-- Stats row -->
  <rect y="429" width="1200" height="1" fill="#e5e0d8"/>
  <rect y="429" width="1200" height="68" fill="#f3f0ec"/>
  <rect y="497" width="1200" height="1" fill="#e5e0d8"/>

  <text x="160" y="469" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#111111" font-weight="bold">80+</text>
  <text x="160" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888888" letter-spacing="1">BRANDS LAUNCHED</text>

  <rect x="319" y="449" width="1" height="30" fill="#d8d3cb"/>

  <text x="480" y="469" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#111111" font-weight="bold">9 yrs</text>
  <text x="480" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888888" letter-spacing="1">IN BUSINESS</text>

  <rect x="639" y="449" width="1" height="30" fill="#d8d3cb"/>

  <text x="800" y="469" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#111111" font-weight="bold">100%</text>
  <text x="800" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888888" letter-spacing="1">INDEPENDENT</text>

  <rect x="959" y="449" width="1" height="30" fill="#d8d3cb"/>

  <text x="1080" y="469" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#0d9488" font-weight="bold">4.9/5</text>
  <text x="1080" y="487" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888888" letter-spacing="1">CLIENT RATING</text>

