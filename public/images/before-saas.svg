  <text x="600" y="296" text-anchor="middle" font-family="Arial" font-size="11" fill="#aaccee" letter-spacing="2">OUR FEATURES — WHY CHOOSE US — LEARN MORE</text>

  <!-- 3-column content -->
  <rect y="302" width="1200" height="320" fill="#ebebeb"/>

  <!-- Col 1 -->
  <rect x="18" y="314" width="368" height="288" fill="white" stroke="#cccccc" stroke-width="1"/>
  <rect x="18" y="314" width="368" height="36" fill="#1e4a8f"/>
  <text x="34" y="338" font-family="Arial" font-size="14" fill="white" font-weight="bold">Reporting Dashboard</text>
  <rect x="28" y="364" width="348" height="88" fill="#f4f4f4" stroke="#dddddd" stroke-width="1"/>
  <text x="202" y="410" text-anchor="middle" font-family="Arial" font-size="11" fill="#aaaaaa">[chart screenshot]</text>
  <text x="34" y="476" font-family="Arial, sans-serif" font-size="12" fill="#333333">Track every metric that matters — MRR,</text>
  <text x="34" y="494" font-family="Arial, sans-serif" font-size="12" fill="#333333">churn, and revenue — in one dashboard.</text>
  <text x="34" y="512" font-family="Arial, sans-serif" font-size="12" fill="#333333">Export to Excel or print for your boss!</text>
  <text x="34" y="548" font-family="Arial" font-size="12" fill="#0066cc" text-decoration="underline">Read more »</text>
  <rect x="34" y="560" width="110" height="24" fill="#e8830a" rx="2"/>
  <text x="89" y="577" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">Learn More</text>

  <!-- Col 2 -->
  <rect x="416" y="314" width="368" height="288" fill="white" stroke="#cccccc" stroke-width="1"/>
  <rect x="416" y="314" width="368" height="36" fill="#c0392b"/>
  <text x="432" y="338" font-family="Arial" font-size="14" fill="white" font-weight="bold">Cloud Storage</text>
  <rect x="426" y="364" width="348" height="88" fill="#f4f4f4" stroke="#dddddd" stroke-width="1"/>
  <text x="600" y="410" text-anchor="middle" font-family="Arial" font-size="11" fill="#aaaaaa">[screenshot]</text>
  <text x="432" y="476" font-family="Arial, sans-serif" font-size="12" fill="#333333">Your data is safely stored on our secure</text>
  <text x="432" y="494" font-family="Arial, sans-serif" font-size="12" fill="#333333">servers!! Access files from anywhere using</text>
  <text x="432" y="512" font-family="Arial, sans-serif" font-size="12" fill="#333333">Internet Explorer, Firefox, or Chrome!</text>
  <text x="432" y="548" font-family="Arial" font-size="12" fill="#0066cc" text-decoration="underline">Read more »</text>
  <rect x="432" y="560" width="110" height="24" fill="#2d8a2d" rx="2"/>
  <text x="487" y="577" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">Learn More</text>

  <!-- Col 3 -->
  <rect x="814" y="314" width="368" height="288" fill="white" stroke="#cccccc" stroke-width="1"/>
  <rect x="814" y="314" width="368" height="36" fill="#6a5acd"/>
  <text x="830" y="338" font-family="Arial" font-size="14" fill="white" font-weight="bold">Customer Support</text>
  <rect x="824" y="364" width="348" height="88" fill="#f4f4f4" stroke="#dddddd" stroke-width="1"/>
  <text x="998" y="410" text-anchor="middle" font-family="Arial" font-size="11" fill="#aaaaaa">[screenshot]</text>
  <text x="830" y="476" font-family="Arial, sans-serif" font-size="12" fill="#333333">Our support team answers emails within</text>
  <text x="830" y="494" font-family="Arial, sans-serif" font-size="12" fill="#333333">48 hours! Call toll-free Mon–Fri 9am–5pm</text>
  <text x="830" y="512" font-family="Arial, sans-serif" font-size="12" fill="#333333">Eastern Standard Time. USA only.</text>
  <text x="830" y="548" font-family="Arial" font-size="12" fill="#0066cc" text-decoration="underline">Read more »</text>
  <rect x="830" y="560" width="110" height="24" fill="#6a5acd" rx="2"/>
  <text x="885" y="577" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="bold">Get Support</text>

  <!-- Footer -->
  <rect y="622" width="1200" height="78" fill="#1a1a1a"/>
  <text x="20" y="648" font-family="Arial" font-size="11" fill="#888888">© 2013 MySaaS Pro — All Rights Reserved | Privacy Policy | Terms of Service | Sitemap</text>
  <text x="20" y="666" font-family="Arial" font-size="10" fill="#555555">You are visitor #004,827 | Best viewed at 1024×768 | Powered by FrontPage 2003</text>
  <rect x="1110" y="630" width="72" height="22" fill="#2d5fa0" rx="2"/>
  <text x="1146" y="646" text-anchor="middle" font-family="Arial" font-size="10" fill="white">Top ↑</text>
</svg>
